<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoYatra Ultra Pro Max+</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f172a;color:white;overflow-x:hidden;}

/* NAV */
nav{
display:flex;justify-content:space-between;
padding:15px;background:rgba(0,0,0,0.7);
position:fixed;width:100%;z-index:100;
}

/* HERO */
.hero{
height:100vh;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
text-align:center;
}
.hero h1{font-size:60px;}

/* BOTTOM NAV (APP STYLE) */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;
}
.bottom-nav button{
background:none;border:none;color:white;font-size:14px;
}

/* SECTIONS */
.section{display:none;padding:20px;}
.active{display:block;}

/* CARDS */
.card{
background:#020617;
padding:15px;margin:10px;border-radius:12px;
}

/* ANIMATION */
.fade{
animation:fadeIn 0.5s ease-in;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* MAP */
iframe{width:100%;height:250px;border-radius:10px;}

/* BUTTON */
button.main{
padding:12px 20px;background:#38bdf8;border:none;border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<nav>
<h2>GoYatra</h2>
</nav>

<div class="hero" id="home">
<h1>GoYatra Ultra</h1>
<p>Next Level Travel Experience</p>
<button class="main" onclick="openApp()">Enter App</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="dashboard" class="section active fade">
<h2>Dashboard</h2>
<div class="card">Welcome to GoYatra 🚀</div>
</div>

<div id="rides" class="section fade">
<h2>Select Ride</h2>
<div class="card">Mini - ₹100/km</div>
<div class="card">Sedan - ₹150/km</div>
<div class="card">SUV - ₹200/km</div>
<input id="from" placeholder="Pickup">
<input id="to" placeholder="Destination">
<button class="main" onclick="book()">Book</button>
<p id="status"></p>
</div>

<div id="map" class="section fade">
<h2>Live Map</h2>
<iframe src="https://maps.google.com/maps?q=kerala&t=&z=7&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div id="profile" class="section fade">
<h2>User Profile</h2>
<div class="card">Name: User</div>
<div class="card">Bookings: 5</div>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="nav" style="display:none;">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('rides')">Rides</button>
<button onclick="show('map')">Map</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>
function openApp(){
document.getElementById("home").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("nav").style.display="flex";
}

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function book(){
let f=document.getElementById("from").value;
let t=document.getElementById("to").value;
document.getElementById("status").innerText="Ride booked from "+f+" to "+t;
}
</script>

</body>
</html>
