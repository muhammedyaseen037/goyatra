<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoYatra Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
display:flex;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* Sidebar */
.sidebar{
width:230px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
height:100vh;
padding:20px;
position:fixed;
border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}

.sidebar a{
display:block;
margin:15px 0;
color:#cbd5e1;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
color:white;
}

/* Main */
.main{
margin-left:230px;
width:100%;
}

/* Hero */
.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(to right,#0ea5e9,#38bdf8);
border-radius:0 0 30px 30px;
}

.hero h1{
font-size:48px;
}

/* Cards */
.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:-40px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
margin:15px;
border-radius:15px;
width:220px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.05);
}

/* Gallery */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.gallery img{
width:260px;
height:160px;
margin:10px;
border-radius:12px;
object-fit:cover;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Booking */
.booking{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
margin:30px;
padding:25px;
border-radius:15px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>GoYatra</h2>
<a href="#">Dashboard</a>
<a href="#">Services</a>
<a href="#">Gallery</a>
<a href="#">Booking</a>
</div>

<div class="main">

<div class="hero">
<h1>Explore Kerala</h1>
<p>Premium Travel Experience</p>
</div>

<div class="cards">
<div class="card">🚕 Cab Booking</div>
<div class="card">🌴 Tour Packages</div>
<div class="card">🏍 Bike Rental</div>
</div>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1593696954577-ab3d39317b97">
<img src="https://images.unsplash.com/photo-1602216056096-3b40cc0c9944">
<img src="https://images.unsplash.com/photo-1587135991058-8816d5c2f10f">
<img src="https://images.unsplash.com/photo-1544735716-392fe2489ffa">
</div>

<div class="booking">
<h2>Book Your Ride</h2>
<input placeholder="Name">
<input placeholder="Pickup Location">
<input placeholder="Destination">
<select>
<option>Cab</option>
<option>Bike</option>
<option>Tour</option>
</select>
<button>Book Now</button>
</div>

</div>

</body>
</html>
