<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoYatra Premium UI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0ea5a5;color:#fff;}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
padding-left:80px;
}
.hero h1{font-size:48px;}
.hero p{margin:15px 0;}
.hero button{
padding:12px 25px;
border:none;
background:#0ea5e9;
color:white;
border-radius:25px;
}

/* Cards */
.cards{
display:flex;
justify-content:center;
gap:20px;
margin-top:-100px;
}
.card{
width:220px;
height:300px;
border-radius:20px;
overflow:hidden;
position:relative;
transform:rotate(-5deg);
}
.card img{
width:100%;
height:100%;
object-fit:cover;
}
.card:nth-child(2){transform:rotate(0);}
.card:nth-child(3){transform:rotate(5deg);}

/* Section */
.section{
background:white;
color:#111;
padding:60px 40px;
text-align:center;
}

/* Packages */
.packages{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}
.package{
width:250px;
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
.package img{
width:100%;
height:150px;
object-fit:cover;
}
.package h3{padding:10px;}

/* Footer */
footer{
background:#0f172a;
padding:20px;
text-align:center;
}
</style>
</head>

<body>

<div class="hero">
<h1>Dream | Explore | Discover</h1>
<p>Experience Kerala like never before</p>
<button>Explore Now</button>
</div>

<div class="cards">
<div class="card">
<img src="https://images.unsplash.com/photo-1593696954577-ab3d39317b97">
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1602216056096-3b40cc0c9944">
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1544735716-392fe2489ffa">
</div>
</div>

<div class="section">
<h2>Our Process</h2>
<p>Choose destination → Book → Travel</p>
</div>

<div class="section">
<h2>Top Packages</h2>
<div class="packages">
<div class="package">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<h3>Munnar Trip</h3>
</div>
<div class="package">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<h3>Alleppey</h3>
</div>
<div class="package">
<img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
<h3>Wayanad</h3>
</div>
</div>
</div>

<footer>
<p>© GoYatra Premium</p>
</footer>

</body>
</html>
