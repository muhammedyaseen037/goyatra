<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoYatra Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f172a;color:white;display:flex;}
.sidebar{
width:220px;background:#020617;height:100vh;padding:20px;position:fixed;
}
.sidebar h2{color:#38bdf8;margin-bottom:30px;}
.sidebar a{display:block;color:white;margin:15px 0;text-decoration:none;}
.main{margin-left:220px;width:100%;}
.hero{
height:50vh;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:linear-gradient(to right,#0ea5e9,#38bdf8);
text-align:center;
}
.cards{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.card{
background:#020617;margin:15px;padding:20px;border-radius:15px;width:250px;
}
.gallery img{
width:250px;height:150px;margin:10px;border-radius:10px;
}
.booking{
background:#020617;padding:20px;margin:20px;border-radius:15px;
}
input,select{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;}
button{padding:10px;background:#38bdf8;border:none;border-radius:8px;}
</style>
</head>

<body>

<div class="sidebar">
<h2>GoYatra</h2>
<a href="#">Dashboard</a>
<a href="#">Services</a>
<a href="#">Map</a>
<a href="#">Booking</a>
</div>

<div class="main">

<div class="hero">
<h1>Travel Kerala Like Never Before</h1>
<p>Book rides, explore places, plan trips</p>
</div>

<div class="cards">
<div class="card">Cab Booking</div>
<div class="card">Tour Packages</div>
<div class="card">Bike Rental</div>
</div>

<div class="gallery cards">
<img src="https://source.unsplash.com/400x300/?munnar">
<img src="https://source.unsplash.com/400x300/?alleppey">
<img src="https://source.unsplash.com/400x300/?wayanad">
</div>

<div class="booking">
<h2>Book Your Ride</h2>
<input placeholder="Name">
<input placeholder="Pickup">
<input placeholder="Destination">
<select>
<option>Cab</option>
<option>Bike</option>
</select>
<button>Book</button>
</div>

</div>

</body>
</html>
