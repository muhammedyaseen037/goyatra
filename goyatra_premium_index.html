<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoYatra Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:white;}
nav{position:fixed;width:100%;top:0;display:flex;justify-content:space-between;padding:15px 40px;background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);z-index:1000;}
nav h2{color:#38bdf8;}
nav a{color:white;margin-left:20px;text-decoration:none;}
.hero{height:100vh;background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.4)),url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;display:flex;justify-content:center;align-items:center;text-align:center;}
.hero h1{font-size:55px;}
.hero button{margin-top:20px;padding:12px 25px;border:none;background:#38bdf8;color:black;border-radius:8px;cursor:pointer;}
section{padding:80px 20px;text-align:center;}
.cards{display:flex;justify-content:center;flex-wrap:wrap;}
.card{background:rgba(255,255,255,0.1);margin:15px;padding:20px;border-radius:15px;width:260px;transition:0.3s;}
.card:hover{transform:scale(1.05);}
.gallery img{width:250px;height:150px;object-fit:cover;margin:10px;border-radius:10px;cursor:pointer;}
.pricing{display:flex;justify-content:center;flex-wrap:wrap;}
.price-card{background:#0f172a;padding:25px;margin:15px;border-radius:15px;width:250px;}
.price-card h3{color:#38bdf8;}
.price-card button{margin-top:10px;padding:8px 15px;border:none;background:#22c55e;color:white;}
form{max-width:400px;margin:auto;}
input,select{width:100%;padding:10px;margin:10px 0;border:none;border-radius:8px;}
button.submit{background:#22c55e;color:white;}
footer{background:#020617;padding:20px;text-align:center;}
.fade{opacity:0;transform:translateY(20px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<nav>
<h2>GoYatra</h2>
<div>
<a href="#">Home</a>
<a href="#gallery">Places</a>
<a href="#pricing">Pricing</a>
<a href="#booking">Booking</a>
</div>
</nav>

<div class="hero">
<div>
<h1>Explore Kerala with GoYatra</h1>
<button onclick="scrollToBooking()">Start Journey</button>
</div>
</div>

<section id="gallery" class="fade">
<h2>Popular Destinations</h2>
<div class="gallery">
<img src="https://source.unsplash.com/400x300/?munnar" onclick="selectPlace('Munnar')">
<img src="https://source.unsplash.com/400x300/?alleppey" onclick="selectPlace('Alleppey')">
<img src="https://source.unsplash.com/400x300/?kochi" onclick="selectPlace('Kochi')">
<img src="https://source.unsplash.com/400x300/?wayanad" onclick="selectPlace('Wayanad')">
</div>
</section>

<section id="pricing" class="fade">
<h2>Our Packages</h2>
<div class="pricing">
<div class="price-card">
<h3>Basic</h3>
<p>₹999</p>
<p>1 Day Trip</p>
<button onclick="autoFill('Basic Package')">Choose</button>
</div>

<div class="price-card">
<h3>Standard</h3>
<p>₹2999</p>
<p>3 Days Trip</p>
<button onclick="autoFill('Standard Package')">Choose</button>
</div>

<div class="price-card">
<h3>Premium</h3>
<p>₹5999</p>
<p>7 Days Trip</p>
<button onclick="autoFill('Premium Package')">Choose</button>
</div>
</div>
</section>

<section id="booking" class="fade">
<h2>Book Your Trip</h2>
<form onsubmit="bookNow(event)">
<input type="text" placeholder="Your Name" required>
<input type="text" id="destination" placeholder="Destination" required>
<input type="text" id="package" placeholder="Selected Package">
<select onchange="selectPlace(this.value)">
<option>Select Place</option>
<option>Munnar</option>
<option>Kochi</option>
<option>Alleppey</option>
<option>Wayanad</option>
</select>
<button class="submit">Submit</button>
</form>
</section>

<footer>
<p>© 2026 GoYatra Premium</p>
</footer>

<script>
function scrollToBooking(){
document.getElementById("booking").scrollIntoView({behavior:"smooth"});
}
function bookNow(e){
e.preventDefault();
alert("Booking successful!");
}
function selectPlace(place){
document.getElementById("destination").value=place;
}
function autoFill(pkg){
document.getElementById("package").value=pkg;
}
const fades=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
fades.forEach(f=>{
if(f.getBoundingClientRect().top < window.innerHeight-100){
f.classList.add('show');
}
});
});
</script>

</body>
</html>
